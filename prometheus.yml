global:
  scrape_interval: 15s

scrape_configs:
  - job_name: portfolio_local
    static_configs:
      - targets: ["app:5000"]
    metrics_path: /metrics

  - job_name: portfolio_render
    scheme: https
    static_configs:
      - targets: ["porto-faza.onrender.com"]
    metrics_path: /metrics

remote_write:
  - url: ${GRAFANA_REMOTE_WRITE_URL}
    basic_auth:
      username: ${GRAFANA_USER_ID}
      password: ${GRAFANA_API_KEY}
