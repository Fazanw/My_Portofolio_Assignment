name: Keep Alive Service

on:
  schedule:
    - cron: "*/10 * * * *"  # Runs every 10 minutes to prevent 15-min inactivity sleep
  workflow_dispatch:        # Allows manual triggering from GitHub UI

jobs:
  ping_site:
    runs-on: ubuntu-latest
    name: Ping Render App
    steps:
      - name: Check Health Status
        run: |
          # Ping the health endpoint and output the HTTP status code
          response=$(curl -s -o /dev/null -w "%{http_code}" https://porto-faza.onrender.com/health)
          if [ "$response" -eq 200 ]; then
            echo "✅ Health check passed (200 OK) - App is active"
          else
            echo "❌ Health check failed (Status: $response)"
            exit 1
          fi