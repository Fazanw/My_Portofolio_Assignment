name: Push Metrics to Grafana Cloud

on:
  schedule:
    - cron: "*/5 * * * *"  # Every 5 minutes
  workflow_dispatch:

jobs:
  push-metrics:
    name: Scrape & Push Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Scrape metrics from Render app
        run: |
          # Scrape metrics from live Render app
          METRICS=$(curl -s https://porto-faza.onrender.com/metrics)
          echo "$METRICS"

      - name: Push metrics to Grafana Cloud
        run: |
          # Scrape and push to Grafana Cloud remote write
          curl -s https://porto-faza.onrender.com/metrics | \
          curl -s -X POST "${{ secrets.GRAFANA_REMOTE_WRITE_URL }}" \
            -u "${{ secrets.GRAFANA_USER_ID }}:${{ secrets.GRAFANA_API_KEY }}" \
            -H "Content-Type: text/plain" \
            --data-binary @- \
            -w "HTTP Status: %{http_code}\n"
          echo "✅ Metrics pushed to Grafana Cloud"
