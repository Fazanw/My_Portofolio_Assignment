<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Stats - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            margin-bottom: 2rem;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #667eea;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }
        .recent-visits {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .recent-visits h2 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f7f7f7;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            color: #555;
        }
        td {
            padding: 0.75rem;
            border-bottom: 1px solid #eee;
            color: #333;
        }
        tr:hover {
            background: #f9f9f9;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 1rem;
            display: block;
            margin-left: auto;
        }
        .refresh-btn:hover {
            background: #5568d3;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Visitor Analytics Dashboard</h1>
        
        <button class="refresh-btn" onclick="loadStats()">🔄 Refresh</button>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Visits</h3>
                <div class="value" id="total-visits">-</div>
            </div>
            <div class="stat-card">
                <h3>Unique Visitors</h3>
                <div class="value" id="unique-visitors">-</div>
            </div>
            <div class="stat-card">
                <h3>Homepage Views</h3>
                <div class="value" id="homepage-views">-</div>
            </div>
        </div>

        <div class="recent-visits">
            <h2>Recent Visits (Last 20)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>IP Address</th>
                        <th>Page</th>
                        <th>User Agent</th>
                    </tr>
                </thead>
                <tbody id="visits-table">
                    <tr><td colspan="4" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadStats() {
            fetch('/admin/stats')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('total-visits').textContent = data.total_visits;
                    document.getElementById('unique-visitors').textContent = data.unique_visitors;
                    document.getElementById('homepage-views').textContent = data.page_views['/'] || 0;
                    
                    const tbody = document.getElementById('visits-table');
                    tbody.innerHTML = '';
                    
                    if (data.recent_visits.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">No visits yet</td></tr>';
                        return;
                    }
                    
                    data.recent_visits.reverse().forEach(visit => {
                        const row = document.createElement('tr');
                        const time = new Date(visit.timestamp).toLocaleString();
                        row.innerHTML = `
                            <td>${time}</td>
                            <td>${visit.ip}</td>
                            <td>${visit.page}</td>
                            <td>${visit.user_agent}</td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(err => {
                    console.error('Error loading stats:', err);
                    document.getElementById('visits-table').innerHTML = 
                        '<tr><td colspan="4" style="text-align:center;color:red">Error loading data</td></tr>';
                });
        }

        // Load stats on page load
        loadStats();
        
        // Auto-refresh every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
